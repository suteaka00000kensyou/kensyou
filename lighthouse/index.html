<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>lighthouse — night</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
  html,body{margin:0;height:100%;background:#05080d;overflow:hidden}
  #c{width:100%;height:100%;display:block}
  #err{position:fixed;inset:0;display:none;place-items:center;color:#c66;
       font-family:system-ui;padding:24px;text-align:center}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="err"></div>
<div id="start" style="position:fixed;inset:0;display:grid;place-items:center;
     background:rgba(5,8,13,.55);cursor:pointer;font-family:system-ui,sans-serif;
     color:#eee;letter-spacing:.14em;font-size:13px;z-index:10">
  CLICK TO ENTER
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const errBox=document.getElementById('err');
const fail=m=>{errBox.style.display='grid';errBox.textContent=m;};

const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.25;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x0c1826,0.0013);

const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.5,6000);
camera.position.set(120,95,215);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.target.set(0,55,0);
controls.maxPolarAngle=Math.PI*0.52;
controls.minDistance=90;controls.maxDistance=600;

/* ---------- sky ---------- */
{
  const g=new THREE.SphereGeometry(3000,32,16);
  const m=new THREE.ShaderMaterial({
    side:THREE.BackSide,
    uniforms:{top:{value:new THREE.Color(0x0c1a2e)},bot:{value:new THREE.Color(0x24455f)}},
    vertexShader:`varying vec3 p;void main(){p=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`varying vec3 p;uniform vec3 top;uniform vec3 bot;
      void main(){float h=normalize(p).y*0.5+0.5;gl_FragColor=vec4(mix(bot,top,smoothstep(0.0,0.75,h)),1.);}`
  });
  scene.add(new THREE.Mesh(g,m));
}

/* ---------- moon: a bright storybook moon, immune to tone mapping ---------- */
const MOONPOS=new THREE.Vector3(-780,430,-1050);
{
  // warm halo, large and soft, additive so it never darkens
  function radial(stops,size=256){
    const cv=document.createElement('canvas');cv.width=cv.height=size;
    const x=cv.getContext('2d');const g=x.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
    stops.forEach(([o,c])=>g.addColorStop(o,c));
    x.fillStyle=g;x.fillRect(0,0,size,size);return new THREE.CanvasTexture(cv);
  }
  const halo=new THREE.Sprite(new THREE.SpriteMaterial({
    map:radial([[0,'rgba(255,240,190,0.9)'],[0.3,'rgba(255,224,140,0.4)'],[1,'rgba(255,224,140,0)']]),
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,toneMapped:false
  }));
  halo.scale.set(1000,1000,1);halo.position.copy(MOONPOS);scene.add(halo);

  // the moon face: colour map with craters painted directly as light/dark tints (no lighting needed)
  const SZ=1024;
  const cv=document.createElement('canvas');cv.width=cv.height=SZ;const x=cv.getContext('2d');
  // bright warm base
  x.fillStyle='#ffe9a3';x.fillRect(0,0,SZ,SZ);
  // broad maria (soft darker plains)
  for(let i=0;i<10;i++){
    const r=SZ*(0.06+Math.random()*0.13),gx=Math.random()*SZ,gy=Math.random()*SZ;
    const g=x.createRadialGradient(gx,gy,0,gx,gy,r);
    g.addColorStop(0,`rgba(226,196,120,${0.18+Math.random()*0.16})`);
    g.addColorStop(1,'rgba(226,196,120,0)');
    x.fillStyle=g;x.beginPath();x.arc(gx,gy,r,0,7);x.fill();
  }
  // craters: darker floor + bright rim, painted (reads as relief without any light)
  function crater(cx3,cy3,r){
    x.fillStyle='rgba(198,168,96,0.35)';
    x.beginPath();x.arc(cx3,cy3,r*0.8,0,7);x.fill();
    x.strokeStyle='rgba(255,247,214,0.5)';x.lineWidth=Math.max(1,r*0.14);
    x.beginPath();x.arc(cx3,cy3,r*0.9,0,7);x.stroke();
  }
  for(let i=0;i<24;i++) crater(Math.random()*SZ,Math.random()*SZ,SZ*(0.02+Math.random()*0.05));
  for(let i=0;i<70;i++) crater(Math.random()*SZ,Math.random()*SZ,SZ*(0.006+Math.random()*0.014));
  // gentle limb darkening at the very edge so it reads as a sphere, not a flat coin
  const ld=x.createRadialGradient(SZ/2,SZ/2,SZ*0.34,SZ/2,SZ/2,SZ*0.5);
  ld.addColorStop(0,'rgba(0,0,0,0)');ld.addColorStop(1,'rgba(120,90,30,0.35)');
  x.fillStyle=ld;x.fillRect(0,0,SZ,SZ);

  const tex=new THREE.CanvasTexture(cv);tex.anisotropy=8;
  const moon=new THREE.Mesh(
    new THREE.SphereGeometry(58,64,64),
    new THREE.MeshBasicMaterial({map:tex,toneMapped:false})   // basic = shows its own colour, always bright
  );
  moon.position.copy(MOONPOS);scene.add(moon);
}

/* ---------- lights (brighter surroundings) ---------- */
scene.add(new THREE.HemisphereLight(0x3a5d7e,0x0a1420,0.85));
scene.add(new THREE.AmbientLight(0x24384d,0.5));
const moonLight=new THREE.DirectionalLight(0xf3e2b0,1.7);
moonLight.position.copy(MOONPOS);
moonLight.castShadow=true;
moonLight.shadow.mapSize.set(4096,4096);
// tight ortho frustum around the lighthouse => crisp shadows, fewer artifacts
const sc=moonLight.shadow.camera;
sc.near=800;sc.far=2200;sc.left=-160;sc.right=160;sc.top=260;sc.bottom=-60;
sc.updateProjectionMatrix();
moonLight.shadow.bias=-0.0004;
moonLight.shadow.normalBias=1.2;      // kills the surface "shadow acne" bands
moonLight.shadow.radius=3;
moonLight.target.position.set(0,60,0);
scene.add(moonLight);scene.add(moonLight.target);

// a gentle fill from the camera side so the lit tower reads
const fill=new THREE.DirectionalLight(0x9ab4d0,0.35);
fill.position.set(200,120,260);scene.add(fill);

/* ---------- pier ---------- */
{
  const mat=new THREE.MeshStandardMaterial({color:0x46505c,roughness:0.95,metalness:0.0});
  const pier=new THREE.Mesh(new THREE.CylinderGeometry(72,82,22,32),mat);
  pier.position.y=-11;pier.receiveShadow=true;scene.add(pier);
}

/* ---------- realistic animated sea (FBM waves + soft glitter) ---------- */
let sea;
{
  const geo=new THREE.PlaneGeometry(6000,6000,320,320);
  geo.rotateX(-Math.PI/2);
  const mat=new THREE.ShaderMaterial({
    uniforms:{
      t:{value:0},
      deep:{value:new THREE.Color(0x0a1a28)},
      shallow:{value:new THREE.Color(0x17384f)},
      crest:{value:new THREE.Color(0x33607d)},
      moonPos:{value:MOONPOS.clone()},
      moonCol:{value:new THREE.Color(0xfff0cc)},
      camPos:{value:new THREE.Vector3()}
    },
    vertexShader:`
      uniform float t;varying vec3 wp;varying float hh;varying vec3 nrm;
      // value noise
      float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
      float vnoise(vec2 p){
        vec2 i=floor(p),f=fract(p);
        float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
        vec2 u=f*f*(3.-2.*f);
        return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
      }
      // fractal brownian motion -> irregular swell
      float fbm(vec2 p){
        float s=0.,a=0.5;
        for(int i=0;i<5;i++){s+=a*vnoise(p);p*=2.03;a*=0.5;}
        return s;
      }
      float waveH(vec2 p){
        float big=sin(p.x*0.010+t*0.7)*2.2 + sin(p.y*0.013-t*0.6)*1.8;      // long swell
        float mid=fbm(p*0.03+vec2(t*0.35,-t*0.28))*4.5;                     // irregular chop
        float rip=fbm(p*0.12-vec2(t*0.9,t*0.7))*1.1;                        // fine ripples
        return big+mid+rip;
      }
      void main(){
        vec3 pos=position;
        float e=waveH(pos.xz);
        pos.y+=e;
        hh=e;
        // approximate normal from finite differences (for lighting/glitter)
        float d=1.5;
        float hx=waveH(pos.xz+vec2(d,0.))-waveH(pos.xz-vec2(d,0.));
        float hz=waveH(pos.xz+vec2(0.,d))-waveH(pos.xz-vec2(0.,d));
        nrm=normalize(vec3(-hx,2.0*d,-hz));
        wp=(modelMatrix*vec4(pos,1.)).xyz;
        gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1.);
      }`,
    fragmentShader:`
      varying vec3 wp;varying float hh;varying vec3 nrm;
      uniform vec3 deep,shallow,crest,moonCol,moonPos,camPos;uniform float t;
      void main(){
        float f=smoothstep(-3.0,4.0,hh);
        vec3 col=mix(deep,shallow,f);
        col=mix(col,crest,smoothstep(3.0,6.0,hh)*0.6);           // pale crests
        vec3 N=normalize(nrm);
        vec3 V=normalize(camPos-wp);
        vec3 L=normalize(moonPos-wp);
        // specular glint from the moon on the wave facets -> natural, uneven sparkle
        vec3 Hh=normalize(L+V);
        float spec=pow(max(dot(N,Hh),0.0),120.0);
        // reflection column: stronger where waves face the moon, along the moon azimuth
        float col2=exp(-pow((wp.x-moonPos.x*0.12)*0.010,2.0));
        col+=moonCol*spec*(0.6+0.8*col2);
        // subtle fresnel sky tint at grazing angles
        float fr=pow(1.0-max(dot(N,V),0.0),4.0);
        col+=vec3(0.10,0.16,0.22)*fr;
        gl_FragColor=vec4(col,1.0);
      }`
  });
  sea=new THREE.Mesh(geo,mat);
  sea.position.y=-3;
  scene.add(sea);
}

/* ---------- lighthouse (GLB with baked materials) ---------- */
new GLTFLoader().load('lighthouse.glb',
  gltf=>{
    const root=gltf.scene;
    // drop the stray background Cube that came along from Blender
    root.traverse(o=>{
      if(o.isMesh && (o.name==='Cube' || (o.material && o.material.name==='Material.001'))){
        o.visible=false;
      }
    });
    // tune materials: shadows on, and make the lantern glass actually glow
    root.traverse(o=>{
      if(!o.isMesh) return;
      o.castShadow=true;o.receiveShadow=true;
      const m=o.material;
      if(!m) return;
      if(m.name==='Windowrantan'){
        m.emissive=new THREE.Color(0xffe1a0);
        m.emissiveIntensity=4.2;
        m.toneMapped=false;
      }
      if(m.name==='Windowhontai'){       // ordinary windows: a soft warm glow too, gentler
        m.emissive=new THREE.Color(0xffe6b0);
        m.emissiveIntensity=0.6;
      }
      m.needsUpdate=true;
    });

    // GLTF export already converts Blender's Z-up to Y-up, but this particular
    // model comes out vertically inverted (finial pointing down) — flip it upright.
    root.rotation.x = Math.PI;

    let box=new THREE.Box3().setFromObject(root);
    let size=new THREE.Vector3();box.getSize(size);
    root.scale.setScalar(210/size.y);   // taller presence

    box=new THREE.Box3().setFromObject(root);
    const c=new THREE.Vector3();box.getCenter(c);
    root.position.x-=c.x;
    root.position.z-=c.z;
    root.position.y-=box.min.y;          // sit the base on y=0
    scene.add(root);

    // sanity flip: if the tallest point ends up BELOW the base point, the model is inverted
    const check=new THREE.Box3().setFromObject(root);
    if (check.max.y < 10) {                          // basically flat/inverted -> flip
      root.rotation.x += Math.PI;
      const b2=new THREE.Box3().setFromObject(root);
      root.position.y -= b2.min.y;
    }

    // warm point light at the lantern so it casts light onto the sea & gallery
    const top=new THREE.Box3().setFromObject(root).max.y;
    const lamp=new THREE.PointLight(0xffe6a8,3.4,900,1.6);
    lamp.position.set(0,top*0.72,0);scene.add(lamp);

    /* ---------- rotating light beams from the lantern ---------- */
    const beamMat=new THREE.MeshBasicMaterial({
      color:0xffe6a0,transparent:true,opacity:0.10,
      side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending
    });
    // a long thin cone = a shaft of light; several of them fan out and spin
    const beams=new THREE.Group();
    const shaftLen=520, shaftR=26;
    for(let i=0;i<2;i++){
      const cone=new THREE.Mesh(new THREE.ConeGeometry(shaftR,shaftLen,24,1,true),beamMat);
      // point the cone sideways (out to the horizon), tip at the lantern
      cone.rotation.z=Math.PI/2;
      cone.position.x=shaftLen/2;
      const arm=new THREE.Group();
      arm.add(cone);
      arm.rotation.y=i*Math.PI;             // two opposite beams
      beams.add(arm);
    }
    beams.position.set(0,top*0.72,0);   // at the lantern-glass level
    scene.add(beams);
    window.__beams=beams;                    // let the animation loop spin it
  },
  undefined,
  ()=>fail('モデルの読み込みに失敗しました（lighthouse.glb が同じフォルダにあるか、サーバー経由で開いているか確認してください）')
);

/* ---------- loop ---------- */
const clock=new THREE.Clock();
function tick(){
  const e=clock.getElapsedTime();
  if(sea){sea.material.uniforms.t.value=e;sea.material.uniforms.camPos.value.copy(camera.position);}
  if(window.__beams) window.__beams.rotation.y = e*0.6;
  controls.update();
  renderer.render(scene,camera);
  requestAnimationFrame(tick);
}
tick();

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

/* ---------- ambient sea sound (synthesised, no audio files) ---------- */
let audioStarted=false;
document.getElementById('start').addEventListener('click', () => {
  if (audioStarted) return;
  audioStarted = true;
  document.getElementById('start').style.display='none';
  startSea();
});

function startSea(){
  const ctx = new (window.AudioContext||window.webkitAudioContext)();

  // real recorded wave audio, looped with a slow fade-in
  const audio = new Audio('audio/sea.mp3');
  audio.loop = true;
  audio.crossOrigin = 'anonymous';
  audio.volume = 0;
  audio.play().catch(()=>{});

  // fade the <audio> element's own volume in gently (simplest, most robust path)
  const target = 0.30;   // lowered so bird calls stand out
  const steps = 40, stepTime = 3000/steps;
  let i = 0;
  const fade = setInterval(() => {
    i++; audio.volume = Math.min(target, target * i/steps);
    if (i>=steps) clearInterval(fade);
  }, stepTime);

  scheduleGulls(ctx);
}

/* ---------- three distinct bird calls, each sweeping left<->right like it's flying past ---------- */

// generic helper: play `fn(t0, pan)` several times while panning smoothly across the stereo field
function flyBy(ctx, callFn, calls, spanSec){
  const t0 = ctx.currentTime + 0.3;
  const startPan = (Math.random()<0.5 ? -1 : 1) * (0.7+Math.random()*0.3);
  const endPan   = -startPan * (0.7+Math.random()*0.3);
  for (let i=0;i<calls;i++){
    const f = i/(Math.max(1,calls-1));
    const pan = startPan + (endPan-startPan)*f;
    const t = t0 + f*spanSec + Math.random()*0.15;
    callFn(ctx, t, pan);
  }
}

/* ウミネコ (black-tailed gull): a rougher, mewing "myaa" - noisy formant with pitch dip */
function umineko(ctx, t0, pan){
  const dur = 0.5+Math.random()*0.3;
  const osc = ctx.createOscillator(); osc.type='sawtooth';
  osc.frequency.setValueAtTime(900+Math.random()*150, t0);
  osc.frequency.exponentialRampToValueAtTime(600, t0+dur*0.5);
  osc.frequency.exponentialRampToValueAtTime(750, t0+dur);
  const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1400; bp.Q.value=2.2;
  const g=ctx.createGain();
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(0.045,t0+dur*0.2);
  g.gain.linearRampToValueAtTime(0,t0+dur);
  const pn=ctx.createStereoPanner?ctx.createStereoPanner():null;
  osc.connect(bp);bp.connect(g);
  if(pn){pn.pan.value=pan;g.connect(pn);pn.connect(ctx.destination);} else g.connect(ctx.destination);
  osc.start(t0);osc.stop(t0+dur+0.05);
}

/* カモメ (herring/common gull): smooth swooping "kyaa-kyaa", pure-ish tone */
function kamome(ctx, t0, pan){
  const dur=0.4+Math.random()*0.25;
  const osc=ctx.createOscillator(); osc.type='sine';
  const f0=1600+Math.random()*400;
  osc.frequency.setValueAtTime(f0,t0);
  osc.frequency.linearRampToValueAtTime(f0+600,t0+dur*0.3);
  osc.frequency.linearRampToValueAtTime(f0-200,t0+dur);
  const g=ctx.createGain();
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(0.04,t0+dur*0.12);
  g.gain.linearRampToValueAtTime(0,t0+dur);
  const pn=ctx.createStereoPanner?ctx.createStereoPanner():null;
  osc.connect(g);
  if(pn){pn.pan.value=pan;g.connect(pn);pn.connect(ctx.destination);} else g.connect(ctx.destination);
  osc.start(t0);osc.stop(t0+dur+0.05);
}

/* イソヒヨドリ (blue rock thrush): clear, melodic, multi-note whistle - more musical, higher */
function isohiyodori(ctx, t0){
  const notes = 3+Math.floor(Math.random()*3);
  let t=t0;
  for(let i=0;i<notes;i++){
    const dur=0.12+Math.random()*0.10;
    const f0=2200+Math.random()*900;
    const osc=ctx.createOscillator(); osc.type='sine';
    osc.frequency.setValueAtTime(f0,t);
    osc.frequency.exponentialRampToValueAtTime(f0*(0.85+Math.random()*0.3),t+dur);
    const g=ctx.createGain();
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.032,t+dur*0.2);
    g.gain.linearRampToValueAtTime(0,t+dur);
    const pn=ctx.createStereoPanner?ctx.createStereoPanner():null;
    osc.connect(g);
    const pan=(Math.random()*1.2-0.6);
    if(pn){pn.pan.value=pan;g.connect(pn);pn.connect(ctx.destination);} else g.connect(ctx.destination);
    osc.start(t);osc.stop(t+dur+0.03);
    t += dur + 0.04 + Math.random()*0.08;
  }
}

function scheduleGulls(ctx){
  function umineceFlock(){
    flyBy(ctx, umineko, 2+Math.floor(Math.random()*3), 1.8+Math.random()*1.4);
    setTimeout(umineceFlock, (16+Math.random()*20)*1000);
  }
  function kamomeFlock(){
    flyBy(ctx, kamome, 2+Math.floor(Math.random()*3), 2.0+Math.random()*1.6);
    setTimeout(kamomeFlock, (20+Math.random()*24)*1000);
  }
  function isohiyodoriSong(){
    isohiyodori(ctx, ctx.currentTime+0.2);
    setTimeout(isohiyodoriSong, (25+Math.random()*30)*1000);
  }
  setTimeout(umineceFlock,  4000+Math.random()*4000);
  setTimeout(kamomeFlock,   9000+Math.random()*5000);
  setTimeout(isohiyodoriSong, 14000+Math.random()*6000);
}</script>
</body>
</html>
